name: "03 - Автоматическое обновление версии"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  pull_request:
    branches: [main, master]
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump-version:
    name: "Обновление версии"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      old_version: ${{ steps.bump.outputs.old_version }}
      version_type: ${{ steps.bump.outputs.version_type }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Get current version
        id: get_current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.1.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump type
        id: get_type
        run: |
          COMMITS=$(git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --pretty=format:"%s")
          if echo "$COMMITS" | grep -qiE "^(feat|feature):"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qiE "^(fix|hotfix):"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.get_current.outputs.current_version }}"
          TYPE="${{ steps.get_type.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "version_type=minor" >> $GITHUB_OUTPUT
          else
            PATCH=$((PATCH + 1))
            echo "version_type=patch" >> $GITHUB_OUTPUT
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Создаем новую ветку для обновления версии
          BRANCH_NAME="version-bump-${{ steps.bump.outputs.new_version }}"
          git checkout -b $BRANCH_NAME
          
          # Обновляем файл версии
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          
          # Коммитим изменения
          git add VERSION
          git commit -m "[${{ steps.bump.outputs.new_version }}] <- [${{ steps.bump.outputs.old_version }}] ${{ steps.bump.outputs.version_type }} up"
          
          # Пушим новую ветку
          git push origin $BRANCH_NAME
          
          # Создаем Pull Request
          gh pr create \
            --title "Автоматическое обновление версии до ${{ steps.bump.outputs.new_version }}" \
            --body "Автоматическое обновление версии после мержа PR #${{ github.event.pull_request.number }}

Тип обновления: ${{ steps.bump.outputs.version_type }}
Старая версия: ${{ steps.bump.outputs.old_version }}
Новая версия: ${{ steps.bump.outputs.new_version }}

Этот PR создан автоматически для обновления версии." \
            --base main \
            --head $BRANCH_NAME \
            --label "version-update"

  add-version-label:
    name: "Добавить label с версией"
    needs: bump-version
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request.merged == true
    steps:
      - name: Add version label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ needs.bump-version.outputs.new_version }}';
            if (!newVersion) {
              console.log('No new version available, skipping label');
              return;
            }
            
            const labelName = `v${newVersion}`;
            
            console.log(`Adding label: ${labelName} to PR #${context.issue.number}`);
            
            try {
              // Пытаемся создать метку
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: '0e8a16',
                description: `Version ${newVersion}`
              }).catch(() => console.log(`Label ${labelName} already exists`));
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              console.log(`✅ Successfully added label ${labelName}`);
            } catch (error) {
              console.log(`❌ Error adding label: ${error.message}`);
            }
