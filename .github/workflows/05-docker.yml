name: "05 - Публикация в Docker Hub"

on:
  pull_request:
    branches: [main, master, dev]
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DOCKER_HUB_USERNAME: ouclamber777
  DOCKER_HUB_REPO: kt_new

jobs:
  docker-build-push:
    name: "🐳 Build and Push Docker Image"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_name: ${{ env.IMAGE_NAME }}
      push_status: ${{ steps.push_check.outputs.status }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "📋 Получение версии"
        id: get_version
        run: |
          echo "═══════════════════════════════════════════"
          echo "🐳 ПУБЛИКАЦИЯ В DOCKER HUB"
          echo "═══════════════════════════════════════════"
          
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
            echo "✅ Версия из VERSION файла: v$VERSION"
          else
            VERSION="0.1.0"
            echo "⚠️ VERSION файл не найден, используем v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "🔧 Определение имени образа"
        run: |
          # Формируем правильное имя образа
          IMAGE_NAME="${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "📦 Имя образа: $IMAGE_NAME"
          
          echo "📋 Информация для Docker Hub:"
          echo "   • Репозиторий: $IMAGE_NAME"
          echo "   • Тег версии: v${{ steps.get_version.outputs.version }}"
          echo "   • Тег latest: latest"

      - name: "🔑 Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "✅ Проверка авторизации"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🔑 ПРОВЕРКА АВТОРИЗАЦИИ"
          echo "═══════════════════════════════════════════"
          echo "👤 Пользователь: ${{ secrets.DOCKERHUB_USERNAME }}"
          echo "📦 Репозиторий: ${{ env.IMAGE_NAME }}"
          echo "✅ Авторизация успешна!"

      - name: "🏗️ Build and Push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: "📊 Результат публикации"
        if: always()
        run: |
          echo "═══════════════════════════════════════════"
          echo "📊 РЕЗУЛЬТАТ ПУБЛИКАЦИИ"
          echo "═══════════════════════════════════════════"
          echo "📦 Образ: ${{ env.IMAGE_NAME }}"
          echo "🏷️ Теги: v${{ steps.get_version.outputs.version }}, latest"
          echo "🔗 Ссылка: https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
          echo ""
          echo "📋 Команда для скачивания:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}"
          echo "═══════════════════════════════════════════"

  add-docker-label:
    name: "🏷️ Добавление label dockerhub"
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "➕ Добавление метки"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = 'dockerhub';
            const version = '${{ needs.docker-build-push.outputs.version }}';
            const imageName = '${{ needs.docker-build-push.outputs.image_name }}';
            
            try {
              // Создаем метку если её нет
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              }).catch(async () => {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '0e8a16',
                  description: '🐳 Опубликовано в Docker Hub'
                });
              });
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              // Добавляем комментарий к PR
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🐳 **Docker образ успешно опубликован!**\n\n` +
                      `**Репозиторий:** [${imageName}](https://hub.docker.com/r/${imageName})\n` +
                      `**Версия:** \`v${version}\`\n` +
                      `**Теги:** \`v${version}\`, \`latest\`\n\n` +
                      `**Команда для скачивания:**\n` +
                      `\`\`\`bash\n` +
                      `docker pull ${imageName}:v${version}\n` +
                      `\`\`\``
              });
              
            } catch (error) {
              console.log(`⚠️ Ошибка: ${error.message}`);
            }
