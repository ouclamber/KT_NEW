name: "05 - Публикация в Docker Hub"

on:
  pull_request:
    branches: [main, master, dev]
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DOCKER_HUB_USERNAME: ouclamber777  # Ваш Docker Hub username

jobs:
  docker-build-push:
    name: "🐳 Build and Push Docker Image"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_name: ${{ env.IMAGE_NAME }}
      push_status: ${{ steps.push_check.outputs.status }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "📋 Получение версии"
        id: get_version
        run: |
          echo "═══════════════════════════════════════════"
          echo "🐳 ПУБЛИКАЦИЯ В DOCKER HUB"
          echo "═══════════════════════════════════════════"
          
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
            echo "✅ Версия из VERSION файла: v$VERSION"
          else
            VERSION="0.1.0"
            echo "⚠️ VERSION файл не найден, используем v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "🔧 Определение имени образа"
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          # Используем Docker Hub username вместо github.repository_owner
          IMAGE_NAME="${{ env.DOCKER_HUB_USERNAME }}/${REPO_NAME}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "📦 Имя образа: $IMAGE_NAME"
          
          echo "📋 Информация для Docker Hub:"
          echo "   • Репозиторий: $IMAGE_NAME"
          echo "   • Тег версии: v${{ steps.get_version.outputs.version }}"
          echo "   • Тег latest: latest"

      - name: "🔑 Login to Docker Hub"
        id: login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "✅ Проверка авторизации"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🔑 ПРОВЕРКА ДОСТУПА К DOCKER HUB"
          echo "═══════════════════════════════════════════"
          
          echo "👤 Пользователь: ${{ secrets.DOCKERHUB_USERNAME }}"
          echo "📦 Репозиторий: ${{ env.IMAGE_NAME }}"
          
          # Проверяем существование репозитория
          echo ""
          echo "🔍 Проверка репозитория ${{ env.IMAGE_NAME }}..."
          
          # Пытаемся получить информацию о репозитории
          if docker manifest inspect ${{ env.IMAGE_NAME }}:latest > /dev/null 2>&1; then
            echo "✅ Репозиторий существует и доступен"
            echo "REPO_EXISTS=true" >> $GITHUB_ENV
          else
            echo "❌ Репозиторий НЕ существует"
            echo "REPO_EXISTS=false" >> $GITHUB_ENV
            echo ""
            echo "📝 СОЗДАЙТЕ РЕПОЗИТОРИЙ В DOCKER HUB:"
            echo "────────────────────────────────────────"
            echo "1. Перейдите: https://hub.docker.com/repository/create"
            echo "2. Заполните:"
            echo "   • Название: $(basename ${{ github.repository }})"
            echo "   • Видимость: Public"
            echo "   • Описание: Автоматически создано из GitHub"
            echo "3. Нажмите 'Create'"
          fi

      # Остальные шаги остаются без изменений...
      - name: "🏗️ Build Docker image"
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          load: true

      - name: "🚀 Push to Docker Hub"
        id: push
        if: env.REPO_EXISTS == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      # ... остальные шаги
